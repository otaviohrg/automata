syntax = "proto3";
package telemetry;
option go_package = "telemetry_server/proto";

message JointTelemetry {
  string robot_id    = 1;
  double timestamp   = 2;
  repeated string joint_names  = 3;
  repeated double positions    = 4;
  repeated double velocities   = 5;
  repeated double efforts      = 6;
}

message AnomalyAlert {
  string robot_id     = 1;
  double timestamp    = 2;
  string joint_name   = 3;
  double anomaly_score = 4;
  bool   is_fault     = 5;
}

message Ack { bool success = 1; }

service TelemetryService {
  rpc PublishJointData(JointTelemetry) returns (Ack);
  rpc StreamAlerts(JointTelemetry) returns (stream AnomalyAlert);
}
