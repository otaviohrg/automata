services:
  helix-base:
    image: helix-base:latest
    build:
      context: ./shared/images/helix-base
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./:/workspace
      - ros2_ws_install:/ros2_ws/install
    network_mode: host
    working_dir: /workspace
    stdin_open: true
    tty: true

  helix-ml:
    image: helix-ml:latest
    build:
      context: ./shared/images/helix-ml
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./:/workspace
      - hf_cache:/root/.cache/huggingface
      - wandb_cache:/root/.local/share/wandb
    network_mode: host
    working_dir: /workspace
    stdin_open: true
    tty: true

  helix-dev:
    image: helix-base:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./:/workspace
      - ros2_ws_install:/ros2_ws/install
    network_mode: host
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: sleep infinity

volumes:
  ros2_ws_install:
  hf_cache:
  wandb_cache:
