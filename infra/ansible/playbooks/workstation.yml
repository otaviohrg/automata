- name: Configure Arch workstation
  hosts: workstation
  become: no
  vars_files:
    - ../vault/secrets.yml

  roles:
    - role: nvidia
      become: yes
    - role: docker
      become: yes
    - role: rust
    - role: go
      become: yes
    - role: tailscale
      become: yes
    - role: tools
      become: yes

  post_tasks:
    - name: Verify Docker GPU access
      command: docker run --rm --gpus all nvidia/cuda:12.1.0-base-ubuntu22.04 nvidia-smi
      changed_when: false
      failed_when: false
      register: gpu_result

    - name: Print GPU verification
      debug:
        msg: "GPU check: {{ 'PASS' if gpu_result.rc == 0 else 'FAIL' }}"

    - name: Verify PyTorch CUDA in automata-ml
      command: >
        docker compose run --rm automata-ml
        python3 -c "import torch; assert torch.cuda.is_available()"
      args:
        chdir: "{{ playbook_dir }}/../../"
      changed_when: false

    - name: Verify rclpy and mujoco in automata-base
      command: >
        docker compose run --rm automata-base
        bash -lc "python3 -c 'import rclpy; import mujoco; print(\"both work\")'"
      args:
        chdir: "{{ playbook_dir }}/../../"
      changed_when: false
