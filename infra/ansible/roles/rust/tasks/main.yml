- name: Install rustup
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.cargo/bin/rustc"

- name: Add cargo to PATH in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: 'export PATH="$HOME/.cargo/bin:$PATH"'
    create: true

- name: Install espup for ESP32 targets
  ansible.builtin.shell: |
    source $HOME/.cargo/env
    cargo install espup
    espup install
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.rustup/toolchains/esp"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Source ESP32 environment in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: 'source ~/export-esp.sh'
    create: true

- name: Install cargo-espflash
  ansible.builtin.shell: |
    source $HOME/.cargo/env
    cargo install cargo-espflash espflash
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.cargo/bin/cargo-espflash"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Install Rust components
  ansible.builtin.shell: |
    source $HOME/.cargo/env
    rustup component add clippy rustfmt rust-analyzer
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Install uv via official installer
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/uv"

- name: Add uv to PATH in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: true
