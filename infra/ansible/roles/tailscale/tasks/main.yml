- name: Install Tailscale
  become: true
  community.general.pacman:
    name: tailscale
    state: present

- name: Enable and start tailscaled
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if already authenticated
  ansible.builtin.command: tailscale status
  register: ts_status
  changed_when: false
  failed_when: false

- name: Authenticate Tailscale
  become: true
  ansible.builtin.command: "tailscale up --authkey={{ tailscale_auth_key }} --advertise-tags=tag:workstation"
  when: "'Logged out' in ts_status.stdout or ts_status.rc != 0"
