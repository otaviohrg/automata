name: CI - Go telemetry server
on:
  push:
    paths:
      - 'shared/telemetry_server/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    paths:
      - 'shared/telemetry_server/**'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/telemetry_server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: shared/telemetry_server/go.mod
          cache-dependency-path: shared/telemetry_server/go.sum

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        working-directory: shared/telemetry_server
        run: |
          protoc \
            --go_out=. \
            --go-grpc_out=. \
            --go_opt=paths=source_relative \
            --go-grpc_opt=paths=source_relative \
            -I . \
            proto/telemetry.proto

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: shared/telemetry_server/coverage.out
