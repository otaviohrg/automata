name: Publish images
on:
  push:
    branches: [main]
    paths:
      - 'shared/images/**'
  pull_request:
    paths:
      - 'shared/images/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push helix-base
        uses: docker/build-push-action@v5
        with:
          context: shared/images/helix-base
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/helix-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push helix-ml
        uses: docker/build-push-action@v5
        with:
          context: shared/images/helix-ml
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/helix-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
